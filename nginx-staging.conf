# Configuración Nginx para STAGING
# Solo para testing - NO para producción

server {
    listen 80;
    server_name staging.fiestaco.today localhost;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Root directory
    root /usr/share/nginx/html;
    
    # Proxy to Next.js app
    location / {
        proxy_pass http://fiestaco-staging:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache settings
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $cookie_nocache $arg_nocache $arg_comment;
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static files cache
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js)$ {
        proxy_pass http://fiestaco-staging:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://fiestaco-staging:3001;
        access_log off;
    }
    
    # Block sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ /(README|LICENSE|CHANGELOG|Dockerfile|docker-compose) {
        deny all;
    }
}