# Docker Compose para FiestaCo - Producción/Staging simplificado
version: '3.8'

services:
  fiestaco:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiestaco-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - fiestaco-network
    # Health check simplificado
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fiestaco-network:
    driver: bridge